<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="d:\Expense-tracker\style.css">
</head>
<body> 
    <div style="display:flex;justify-content: center; position: relative;top: 30px; gap: 0;" ><h1 style="font-size: 43px; text-align: center; color: #f0e6d0; ">Expenses</h1></div>
    <div class="expenses-box-container">
        <div class="expenses-box">
            <div class="btn-container"><button class="add-btn">+</button></div>
        </div>  
    </div>
    <div class="overlay"></div>
    <div class="expenseCard">
        <div class="amount-row">
        <p>Amount</p>
         <input type="number">
        </div>
        <div class="amount-row">
        <label for="category-select">Categories</label>
        <select id="category-select" name="category">
            <option value="food">Food</option>
            <option value="snacks">Snacks</option>
            <option value="health">Health</option>
            <option value="shopping">Shopping</option>
            <option value="Others">Others</option>
        </select>
        
</div>
    <div class="amount-row"><p>Date</p><input type="date"></div>
    <div class="amount-row" ><p>Note</p><textarea></textarea></div>
    <div><button class="Add">Add</button></div>
    </div>

    <div class="nav-bottom">
        <div class="page">
            <p>Stat</p>
        </div>
        <div class="page">
            <p>Categories</p>
        </div>
        <a href="expenses.html" style="text-decoration: none; color:inherit; ">
        <div class="page">
            <p>Expenses</p>
        </div></a>
        <div class="page">
            <p>Ai Analysis</p>
        </div>
    </div>
    <script>

    const btn = document.querySelector('.add-btn')
    const overlay = document.querySelector('.overlay')
    const expenseCard=document.querySelector('.expenseCard')
    const Add=document.querySelector('.Add')

    btn.addEventListener('click', function() {
    overlay.classList.add('active')
    expenseCard.classList.add('active')
    
})
    overlay.addEventListener('click',function(){
        overlay.classList.remove('active')
        expenseCard.classList.remove('active')
    })
    Add.addEventListener('click',function(){
        overlay.classList.remove('active')
        expenseCard.classList.remove('active')
    })
</script>

</body>
</html>
